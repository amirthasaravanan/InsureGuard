<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsureGuard | Modern Insurance Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="relative">
    <header class="w-full text-center">
    <div class="logo-text">
        Insure<span class="text-sky-400">Guard</span>
    </div>
    
    
</header>

    <main class="flex-1 flex items-center justify-center px-6 relative z-10">
        <div class="max-w-5xl w-full flex flex-col items-center text-center">
            
            <div class="inline-flex items-center gap-2 bg-blue-50 text-blue-600 px-5 py-2.5 rounded-full mb-10 border border-blue-100 shadow-sm">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-600"></span>
                </span>
                <span class="text-[11px] font-black uppercase tracking-widest">AI-Powered Insurance Claims Analyser</span>
            </div>

            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter leading-tight mb-8 text-slate-900">
                Genuine Claims. <br/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-sky-400 font-black">Zero Frauds.</span>
            </h1>

            <p class="text-slate-500 text-lg md:text-2xl max-w-3xl mb-14 font-medium leading-relaxed">
                 InsureGuard powers real-time claim intelligence to detect fraud claims instantly and accurately predicts genuine claim approvals.

            </p>

            <div class="w-full max-w-md">
                <a href="/apply" class="btn-primary-light text-2xl w-full py-6 no-underline shadow-2xl shadow-blue-200">
                    Get Started
                </a>
            </div>

        </div>
    </main>

    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 text-[10px] font-black uppercase tracking-[0.6em] text-slate-300">
        InsureGuard Engine v1.0
    </div>
</body>
</html>
